{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        <div class="card shadow-lg p-3">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                         style="width: 60px; height: 60px; background: rgba(79, 70, 229, 0.1); color: var(--primary-color);">
                        <i class="fas fa-user-lock fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-muted small">Sign in to manage your attendance and tasks</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors or messages %}
                    <div class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i><strong>Login Failed!</strong> Check credentials.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-muted">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0" style="border-radius: 10px 0 0 10px; border-color: var(--border-color); color: var(--text-muted);">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter your username" required style="border-radius: 0 10px 10px 0;">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label small fw-bold text-muted">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0" style="border-radius: 10px 0 0 10px; border-color: var(--border-color); color: var(--text-muted);">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter your password" required style="border-radius: 0 10px 10px 0;">
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Sign In <i class="fas fa-arrow-right ms-2 small"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: var(--primary-color);">Create Account</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
