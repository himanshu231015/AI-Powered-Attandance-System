{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-chalkboard-teacher me-2"></i>Add New Teacher</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="row g-3">
                        <!-- Username -->
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="e.g. TEA010" required>
                        </div>

                        <!-- Name -->
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="e.g. John Doe" required>
                        </div>

                        <!-- Password -->
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <!-- Designation -->
                        <div class="col-md-6">
                            <label for="designation" class="form-label fw-semibold">Designation</label>
                            <select class="form-select" id="designation" name="designation" required>
                                <option value="asst_prof" selected>Assistant Professor</option>
                                <option value="hod">HOD (Head of Department)</option>
                            </select>
                        </div>

                        <!-- Department -->
                        <div class="col-12">
                            <label for="department" class="form-label fw-semibold">
                                <i class="fas fa-building me-1 text-primary"></i>Department
                            </label>
                            <select class="form-select" id="department" name="department" required>
                                {% for code, label in dept_choices %}
                                    <option value="{{ code }}">{{ code }} — {{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Coordinator Assignment -->
                        <div class="col-12 mt-4">
                            <div class="card bg-light border-0">
                                <div class="card-body p-3">
                                    <h5 class="fw-bold mb-3 text-primary">
                                        <i class="fas fa-users-cog me-1"></i>Class Coordinator Assignment
                                    </h5>
                                    
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="is_coordinator" name="is_coordinator" onchange="toggleCoordinatorFields()">
                                        <label class="form-check-label fw-semibold" for="is_coordinator">
                                            Assign this teacher as Class Coordinator
                                        </label>
                                    </div>
                                    
                                    <div id="coordinator-fields" style="display: none;">
                                        <div class="row g-3">
                                            <div class="col-md-4">
                                                <label for="coord_department" class="form-label small fw-bold text-muted">Coordinating Department</label>
                                                <select class="form-select form-select-sm" id="coord_department" name="coord_department">
                                                    {% for code, label in dept_choices %}
                                                        <option value="{{ code }}">
                                                            {{ code }}
                                                        </option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div class="col-md-4">
                                                <label for="coord_year" class="form-label small fw-bold text-muted">Coordinating Year</label>
                                                <input type="text" class="form-control form-control-sm" id="coord_year" name="coord_year" placeholder="e.g. 1">
                                            </div>
                                            <div class="col-md-4">
                                                <label for="coord_section" class="form-label small fw-bold text-muted">Coordinating Section</label>
                                                <input type="text" class="form-control form-control-sm" id="coord_section" name="coord_section" placeholder="e.g. A">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-between flex-wrap mt-4">
                        <button type="submit" name="save_and_add_another" value="true" class="btn btn-outline-primary btn-lg flex-grow-1" onclick="this.form.submittedBtn=this;">
                            <i class="fas fa-plus me-2"></i>Save & Add Another
                        </button>
                        <button type="submit" name="save" value="true" class="btn btn-primary btn-lg flex-grow-1" onclick="this.form.submittedBtn=this;">
                            <i class="fas fa-save me-2"></i>Save Teacher
                        </button>
                    </div>
                </form>

                <script>
                    function toggleCoordinatorFields() {
                        const isChecked = document.getElementById('is_coordinator').checked;
                        const fieldsDiv = document.getElementById('coordinator-fields');
                        fieldsDiv.style.display = isChecked ? 'block' : 'none';
                    }

                    document.querySelector('form').addEventListener('submit', function (e) {
                        const btn = this.submittedBtn;
                        if (btn && btn.name) {
                            const hidden = document.createElement('input');
                            hidden.type = 'hidden';
                            hidden.name = btn.name;
                            hidden.value = btn.value || 'true';
                            this.appendChild(hidden);
                        }
                    });
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
