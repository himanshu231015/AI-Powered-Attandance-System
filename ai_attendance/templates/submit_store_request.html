{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-lg">
      <div class="card-header" style="background:linear-gradient(90deg,#064e3b,#059669);color:#fff;">
        <h4 class="mb-0"><i class="fas fa-boxes me-2"></i>Request Items from Store</h4>
      </div>
      <div class="card-body p-4">
        <form method="post" id="storeForm">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Request Title</label>
            <input type="text" name="title" class="form-control"
                   placeholder="e.g. Lab Supplies for April" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2"
                      placeholder="Any additional information…"></textarea>
          </div>

          <hr>
          <h6 class="fw-bold mb-3"><i class="fas fa-list me-1 text-success"></i> Items</h6>

          <div id="itemsContainer">
            <div class="item-row row g-2 mb-2 align-items-center">
              <div class="col-7">
                <input type="text" name="item_name" class="form-control"
                       placeholder="Item name (e.g. Marker, A4 Paper)" required>
              </div>
              <div class="col-3">
                <input type="number" name="item_qty" class="form-control"
                       placeholder="Qty" min="1" value="1" required>
              </div>
              <div class="col-2">
                <button type="button" class="btn btn-outline-danger btn-sm w-100 remove-item" disabled>
                  <i class="fas fa-minus"></i>
                </button>
              </div>
            </div>
          </div>

          <button type="button" id="addItemBtn" class="btn btn-outline-success btn-sm mt-1">
            <i class="fas fa-plus me-1"></i> Add Another Item
          </button>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="fas fa-paper-plane me-2"></i> Submit Request
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('addItemBtn').addEventListener('click', function () {
  const container = document.getElementById('itemsContainer');
  const row = document.createElement('div');
  row.className = 'item-row row g-2 mb-2 align-items-center';
  row.innerHTML = `
    <div class="col-7">
      <input type="text" name="item_name" class="form-control" placeholder="Item name" required>
    </div>
    <div class="col-3">
      <input type="number" name="item_qty" class="form-control" placeholder="Qty" min="1" value="1" required>
    </div>
    <div class="col-2">
      <button type="button" class="btn btn-outline-danger btn-sm w-100 remove-item">
        <i class="fas fa-minus"></i>
      </button>
    </div>`;
  container.appendChild(row);
  row.querySelector('.remove-item').addEventListener('click', function () {
    row.remove();
  });
});
</script>
{% endblock %}
