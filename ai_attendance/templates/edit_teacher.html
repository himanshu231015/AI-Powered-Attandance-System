{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-lg">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">
                    <i class="fas fa-user-edit me-2"></i>Edit Teacher — {{ teacher.username }}
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="row g-3">
                        <!-- Username -->
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   value="{{ teacher.username }}" required>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ teacher.email }}" required>
                        </div>

                        <!-- Password -->
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-semibold">
                                New Password
                                <small class="text-muted fw-normal">(blank = unchanged)</small>
                            </label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Leave blank to keep current">
                        </div>

                        <!-- Designation -->
                        <div class="col-md-6">
                            <label for="designation" class="form-label fw-semibold">Designation</label>
                            <select class="form-select" id="designation" name="designation" required>
                                <option value="asst_prof"
                                    {% if profile.designation == 'asst_prof' %}selected{% endif %}>
                                    Assistant Professor
                                </option>
                                <option value="hod"
                                    {% if profile.designation == 'hod' %}selected{% endif %}>
                                    HOD (Head of Department)
                                </option>
                            </select>
                        </div>

                        <!-- Department -->
                        <div class="col-12">
                            <label for="department" class="form-label fw-semibold">
                                <i class="fas fa-building me-1 text-warning"></i>Department
                            </label>
                            <select class="form-select" id="department" name="department" required>
                                {% for code, label in dept_choices %}
                                    <option value="{{ code }}"
                                        {% if profile.department == code %}selected{% endif %}>
                                        {{ code }} — {{ label }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Coordinator Assignment -->
                        <div class="col-12 mt-4">
                            <div class="card bg-light border-0">
                                <div class="card-body p-3">
                                    <h5 class="fw-bold mb-3 text-warning">
                                        <i class="fas fa-users-cog me-1"></i>Class Coordinator Assignment
                                    </h5>
                                    
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="is_coordinator" name="is_coordinator" {% if coordinator %}checked{% endif %} onchange="toggleCoordinatorFields()">
                                        <label class="form-check-label fw-semibold" for="is_coordinator">
                                            Assign this teacher as Class Coordinator
                                        </label>
                                    </div>
                                    
                                    <div id="coordinator-fields" style="{% if not coordinator %}display: none;{% endif %}">
                                        <div class="row g-3">
                                            <div class="col-md-4">
                                                <label for="coord_department" class="form-label small fw-bold text-muted">Coordinating Department</label>
                                                <select class="form-select form-select-sm" id="coord_department" name="coord_department">
                                                    {% for code, label in dept_choices %}
                                                        <option value="{{ code }}" {% if coordinator.department == code %}selected{% endif %}>
                                                            {{ code }}
                                                        </option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div class="col-md-4">
                                                <label for="coord_year" class="form-label small fw-bold text-muted">Coordinating Year</label>
                                                <input type="text" class="form-control form-control-sm" id="coord_year" name="coord_year" value="{{ coordinator.year|default:'' }}" placeholder="e.g. 1">
                                            </div>
                                            <div class="col-md-4">
                                                <label for="coord_section" class="form-label small fw-bold text-muted">Coordinating Section</label>
                                                <input type="text" class="form-control form-control-sm" id="coord_section" name="coord_section" value="{{ coordinator.section|default:'' }}" placeholder="e.g. A">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-warning btn-lg flex-grow-1">
                            <i class="fas fa-save me-2"></i>Save Changes
                        </button>
                        <a href="{% url 'manage_teachers' %}" class="btn btn-secondary btn-lg">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                    </div>
                </form>

                <script>
                    function toggleCoordinatorFields() {
                        const isChecked = document.getElementById('is_coordinator').checked;
                        const fieldsDiv = document.getElementById('coordinator-fields');
                        fieldsDiv.style.display = isChecked ? 'block' : 'none';
                    }
                </script>

                <!-- Danger Zone -->
                <hr class="mt-4">
                <div class="p-3 rounded" style="background:rgba(220,53,69,0.08); border:1px solid rgba(220,53,69,0.3);">
                    <h6 class="text-danger mb-1">
                        <i class="fas fa-exclamation-triangle me-1"></i>Danger Zone
                    </h6>
                    <p class="text-muted small mb-2">
                        Permanently delete this teacher. This action cannot be undone.
                    </p>
                    <form method="post" action="{% url 'delete_teacher' teacher.id %}"
                          onsubmit="return confirm('Delete {{ teacher.username }}? This cannot be undone.');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="fas fa-trash me-1"></i>Delete Teacher
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
